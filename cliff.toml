# git-cliff configuration — https://git-cliff.org
# CHANGELOG.md is generated from Conventional Commit subjects on main.
# With squash-merge (commit title = PR title), each entry is one merged PR.

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.\n
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}\
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }}
    {% endfor %}\
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^revert", group = "Revert" },
  { body = ".*security", group = "Security" },
  { message = "^(chore|ci|build|test|style)", skip = true },
  # Anything not grouped above (init:, stray types, …) stays out of the changelog.
  { message = ".*", skip = true },
]
protect_breaking_commits = true
filter_commits = false
# Only vX.Y.Z tags are releases.
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "newest"
